<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <link href="https://cdn.jotfor.ms/fonts/?family=Circular&v=4.1.65042" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
    <title>Registro</title>
</head>
<body>
    <section class="container_principal">
        <div class="Principal Registro">
            <header class="container hearder_P">
                <section class="Header_izquierda">
                    <img width="28" height="28" src="https://img.icons8.com/color/48/davinci-resolve.png" alt="davinci-resolve"/><h3>Gilbert</h3>
                </section>
                <section class="Header_derecha">
                    <span>¿Ya tienes cuenta? &nbsp<button class="boton_header">Iniciar sesión</button></span>
                </section>
            </header>
            <main class="container main_P">
                <section class="section_m ">
                    <h1>Cree su cuenta</h1>
                    <p>Reciba información, pagos y firmas con <br> formularios personalizados online.</p>
                </section>
                <section class="section_m botones_registro">
                    <article class="Boton google">
                        <button class="icon_reg"><img width="28" height="28" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo"/></button>
                        <span class="boton-texto">Google</span>
                    </article>
                    <article class="Boton microsoft">
                        <button class="icon_reg"><img width="28" height="28" src="https://img.icons8.com/color/48/microsoft.png" alt="microsoft"/> </button>
                        <span class="boton-texto">Microsoft</span>
                    </article>
                    <article class="Boton Facebook">
                        <button class="icon_reg" ><img width="28" height="28" src="https://img.icons8.com/fluency/48/facebook.png" alt="facebook"/></button>
                        <span class="boton-texto">Facebook</span>
                    </article>
                    <article class="Boton Apple">
                        <button class="icon_reg" ><img width="28" height="28" src="https://img.icons8.com/ios-filled/50/mac-os.png" alt="mac-os"/></button>
                        <span class="boton-texto">Apple</span>
                    </article>
                </section>
                <section class="section_m  section-registrese">
                    <span class="separator">O registrese con </span>
                </section>
                <section class="section_m section_form">
                    <form action="">
                        <label class="form_ingreso" for="correo"><span>Dirección de correo</span>
                        <input class="form_ingreso input_ingreso" id="correo" type="email" autocomplete="on" required placeholder="Ingrese el correo"></label>
                        <button class="form_ingreso boton_ingreso"> Continuar con email</button>
                </form>            
                </section>
            </main>
            <footer class="container footer_P">
                <div><span>2026 Gilbert Inc.</span></div>
                <div><span>Version 0.1</span></div>
            </footer>
        </div>
        <div class="Principal slides">
            <span>aquí ira los slides</span>
        </div>
    </section>
</body>
</html>
